spring.application.name=tournament

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/tournament_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

server.port=${SERVER_PORT:8081}
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

minio.url=${MINIO_URL:http://localhost:9000}
minio.public-url=${MINIO_PUBLIC_URL:http://localhost:9000}
minio.access-key=${MINIO_ACCESS_KEY:${MINIO_ROOT_USER:minioadmin}}
minio.secret-key=${MINIO_SECRET_KEY:${MINIO_ROOT_PASSWORD:minioadmin123}}
minio.bucket=${MINIO_BUCKET:images}