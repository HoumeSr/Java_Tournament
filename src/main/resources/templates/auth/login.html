<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Вход | Турнирная платформа</title>

  <link rel="icon" type="image/x-icon" th:href="@{/images/favicon.ico}">
  <link rel="shortcut icon" type="image/x-icon" th:href="@{/images/favicon.ico}">
  
  <link th:href="@{/css/auth/register.css}" rel="stylesheet" type="text/css"/>
</head>
<body>

<div class="register-container">
  <!-- Левая панель: карусель фоновых изображений -->
  <div class="hero-panel">
    <div class="slideshow-bg" id="slideshowBg"></div>
    <div class="hero-content">
      <div class="hero-badge">🏆 С возвращением</div>
      <h1>Снова в игре? <br>Войди в аккаунт</h1>
      <p>Продолжай свой путь к чемпионству. Участвуй в турнирах, отслеживай рейтинг и забирай победы.</p>
    </div>
    <div class="slider-dots" id="sliderDots"></div>
  </div>

  <!-- Правая часть: форма входа -->
  <div class="form-panel">
    <a href="/" class="back-home-btn">
      <i class="fas fa-arrow-left"></i> На главную
    </a>

    <div class="form-header">
      <h2>Войти в аккаунт</h2>
      <p>Введи свои данные для доступа</p>
    </div>

    <!-- Убираем action и method - форма отправляется через AJAX -->
    <form class="register-form" id="loginForm">
      <div class="input-group">
        <label for="login">Никнейм или email</label>
        <input type="text" id="login" name="login" placeholder="Никнейм или email" required autocomplete="username">
      </div>

      <div class="input-group">
        <label for="password">Пароль</label>
        <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" required>
      </div>

      <button type="submit" class="btn-register">Войти →</button>

      <div class="login-redirect">
        Нет аккаунта? <a th:href="@{/register}">Зарегистрироваться</a>
      </div>

    </form>
  </div>
</div>

<div id="demoToast" class="demo-toast" style="opacity: 0; visibility: hidden;"></div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script th:src="@{/js/api.js}"></script>
<script th:src="@{/js/auth/login.js}"></script>

</body>
</html>
