<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Регистрация | Бобры</title>

  <link rel="icon" type="image/x-icon" th:href="@{/images/favicon.ico}">
  <link rel="shortcut icon" type="image/x-icon" th:href="@{/images/favicon.ico}">
  
  <link th:href="@{/css/register.css}" rel="stylesheet">
</head>
<body>

<div class="register-container">
  <div class="hero-panel">
    <div class="slideshow-bg" id="slideshowBg"></div>
    <div class="hero-content">
      <div class="hero-badge">✨ Добро пожаловать</div>
      <h1>Твой путь к чемпионству <br>начинается здесь</h1>
      <p>Испытай себя в честной борьбе, поднимайся в таблице лидеров и получай призы. Турниры каждый день — твоя легенда ждёт.</p>
    </div>
    <div class="slider-dots" id="sliderDots"></div>
  </div>

  <div class="form-panel">
    <div class="form-header">
      <h2>Создать аккаунт</h2>
      <p>Заполните данные, чтобы начать путешествие</p>
    </div>

    <!-- Убираем action и method - форма отправляется через AJAX -->
    <form class="register-form" id="registrationForm">
      <div class="input-group">
        <label for="username">Никнейм</label>
        <input type="text" id="username" name="username" placeholder="CyberBobr" required autocomplete="username">
      </div>

      <div class="input-group">
        <label for="email">Электронная почта</label>
        <input type="email" id="email" name="email" placeholder="hello@example.com" required autocomplete="email">
      </div>

      <div class="input-group">
        <label for="password">Пароль</label>
        <input type="password" id="password" name="password" placeholder="Минимум 6 символов" required autocomplete="new-password">
      </div>

      <div class="input-group">
        <label for="confirmPassword">Подтверждение пароля</label>
        <input type="password" id="confirmPassword" name="confirmPassword" placeholder="••••••••" required autocomplete="off">
      </div>

      <button type="submit" class="btn-register">Зарегистрироваться →</button>

      <div class="login-redirect">
        Уже есть аккаунт? <a th:href="@{/login}">Войти</a>
      </div>
    </form>
  </div>
</div>

<div id="demoToast" class="demo-toast"></div>

<script th:src="@{/js/api.js}"></script>
<script th:src="@{/js/register.js}"></script>
</body>
</html>
