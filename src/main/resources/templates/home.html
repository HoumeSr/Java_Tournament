<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Бобры — Турнирная платформа</title>
    
    <link rel="icon" type="image/x-icon" th:href="@{/images/favicon.ico}">
    <link rel="shortcut icon" type="image/x-icon" th:href="@{/images/favicon.ico}">

    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <link th:href="@{/css/homepage/home.css}" rel="stylesheet">
    <link th:href="@{/css/homepage/notifications.css}" rel="stylesheet">
</head>
<body>

<header class="navbar">
    <div class="logo-area">
        <div class="site-title">⚡ Бобры</div>
        <div class="nav-links">
            <a th:href="@{/teams}" class="nav-item">Команды</a>
            <a th:href="@{/rating}" class="nav-item">Рейтинг</a>
        </div>
    </div>
    <div class="auth-buttons" id="authButtons"></div>
</header>

<main class="container">
    <div class="categories-section">
        <div class="categories-grid" id="categoriesContainer"></div>
    </div>

    <div class="game-filters" id="gameFiltersContainer"></div>
    <div class="status-filter-container" id="statusFilterContainer"></div>

    <div class="tournaments-header">
        <div class="tournaments-title">🏆 Турниры</div>
        <div class="tournaments-actions">
            <div class="tournaments-count" id="tournamentCount">0 событий</div>
            <a href="/tournaments/create" class="btn-create-tournament-header" id="createTournamentBtn" style="display: none;">
                <i class="fas fa-plus-circle"></i> Создать турнир
            </a>
        </div>
    </div>
    
    <div id="tournamentsGrid" class="tournaments-grid"></div>

    <div id="pagination" class="pagination-container"></div>
</main>

<footer class="modern-footer">
    <div class="footer-content">
        <div class="footer-info">
            <div class="footer-logo">⚡ Бобры</div>
            <p class="footer-tagline">Турнирная платформа нового поколения</p>
            <p class="footer-copyright">© 2026 Бобры. Создано с ❤️ командой <span class="team-name">Космо-Бобры</span>. Все права защищены.</p>
        </div>
        <div class="footer-social">
            <a href="https://vk.com/ilnurmuhametzanov" class="social-icon vk" target="_blank"><i class="fab fa-vk"></i></a>
            <a href="https://discord.gg/zur_chelovek" class="social-icon discord" target="_blank"><i class="fab fa-discord"></i></a>
            <a href="https://github.com/HoumeSr" class="social-icon gh" target="_blank"><i class="fab fa-github"></i></a>
        </div>
    </div>
</footer>

<div id="demoToast" class="demo-toast"></div>
<script th:src="@{/js/api.js}"></script>
<script th:src="@{/js/auth.js}"></script>
<script th:src="@{/js/homepage/home.js}"></script>
<script th:src="@{/js/homepage/notifications.js}"></script>
</body>
</html>
