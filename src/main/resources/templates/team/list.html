<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title th:text="${pageTitle} + ' — Бобры'">Команды — Бобры</title>
    
    <link rel="icon" type="image/x-icon" th:href="@{/images/favicon.ico}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link th:href="@{/css/teams.css}" rel="stylesheet">
</head>
<body>

<header class="navbar">
    <div class="logo-area">
        <div class="site-title">⚡ Бобры</div>
        <div class="nav-links">
            <a th:href="@{/}" class="nav-item">Главная</a>
            <a th:href="@{/teams}" class="nav-item active-nav">Команды</a>
            <a th:href="@{/tournaments}" class="nav-item">Турниры</a>
            <a th:href="@{/rating}" class="nav-item">Рейтинг</a>
        </div>
    </div>
    <div class="auth-buttons" id="authButtons"></div>
</header>

<main class="container">
    <div class="page-header">
        <h1>
            <i class="fas fa-users"></i>
            <span>Все команды</span>
        </h1>
    </div>

    <div id="teamsContainer" class="teams-container">
        <div class="loading-spinner">
            <i class="fas fa-spinner fa-spin"></i>
            <p>Загрузка команд...</p>
        </div>
    </div>
</main>

<footer class="modern-footer">
    <div class="footer-content">
        <div class="footer-info">
            <div class="footer-logo">⚡ Бобры</div>
            <p class="footer-tagline">Турнирная платформа нового поколения</p>
            <p class="footer-copyright">© 2026 Бобры. Создано с ❤️ командой <span class="team-name">Космо-Бобры</span>. Все права защищены.</p>
        </div>
        <div class="footer-social">
            <a href="https://vk.com/ilnurmuhametzanov" class="social-icon vk" target="_blank"><i class="fab fa-vk"></i></a>
            <a href="https://discord.gg/zur_chelovek" class="social-icon discord" target="_blank"><i class="fab fa-discord"></i></a>
            <a href="https://github.com/HoumeSr" class="social-icon gh" target="_blank"><i class="fab fa-github"></i></a>
        </div>
    </div>
</footer>

<div id="demoToast" class="demo-toast"></div>

<!-- FAB кнопка создания команды -->
<div class="fab-create-team">
    <button class="fab-btn" id="createTeamFab">
        <i class="fas fa-plus"></i>
        <span class="fab-text">Создать команду</span>
    </button>
</div>

<script th:src="@{/js/teams.js}"></script>
</body>
</html>
