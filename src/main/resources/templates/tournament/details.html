<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Турнирная сетка — Бобры</title>
    
    <link rel="icon" type="image/x-icon" th:href="@{/images/favicon.ico}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link th:href="@{/css/tournament.css}" rel="stylesheet">
</head>
<body>

<header class="navbar">
    <div class="logo-area">
        <div class="site-title">⚡ Бобры</div>
        <div class="nav-links">
            <a th:href="@{/}" class="nav-item">Главная</a>
            <a th:href="@{/teams}" class="nav-item">Команды</a>
            <a data-nav="matches" class="nav-item active-nav">Матчи</a>
            <a th:href="@{/rating}" class="nav-item">Рейтинг</a>
        </div>
    </div>
    <div class="auth-buttons" id="authButtons"></div>
</header>

<main class="container">
    <div class="tournament-header">
        <h1><i class="fas fa-trophy"></i> Турнирная сетка</h1>
        <p>Олимпийская система (плей-офф)</p>
    </div>

    <div class="bracket-controls">
        <label for="teamsCount">Количество команд:</label>
        <select id="teamsCount" class="teams-select">
            <option value="2">2 команды</option>
            <option value="4" selected>4 команды</option>
            <option value="8">8 команд</option>
            <option value="16">16 команд</option>
        </select>
        <button id="generateBtn" class="btn-generate">
            <i class="fas fa-chart-line"></i> Построить сетку
        </button>
    </div>

    <div id="bracketContainer" class="bracket-container">
        <!-- Сетка с линиями будет сгенерирована здесь -->
    </div>
</main>

<footer class="modern-footer">
    <div class="footer-content">
        <div class="footer-info">
            <div class="footer-logo">⚡ Бобры</div>
            <p class="footer-tagline">Турнирная платформа нового поколения</p>
            <p class="footer-copyright">© 2026 Бобры. Создано с ❤️ командой <span class="team-name">Космо-Бобры</span>. Все права защищены.</p>
        </div>
        <div class="footer-social">
            <a href="https://vk.com/ilnurmuhametzanov" class="social-icon vk" target="_blank"><i class="fab fa-vk"></i></a>
            <a href="https://discord.gg/zur_chelovek" class="social-icon discord" target="_blank"><i class="fab fa-discord"></i></a>
            <a href="https://github.com/HoumeSr" class="social-icon gh" target="_blank"><i class="fab fa-github"></i></a>
        </div>
    </div>
</footer>

<div id="demoToast" class="demo-toast"></div>

<script th:src="@{/js/tournament-bracket.js}"></script>
</body>
</html>
